name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
      - run: go mod verify

  lint:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
      - run: go vet ./...
      - run: go install honnef.co/go/tools/cmd/staticcheck@2025.1.1
      - run: staticcheck ./...

  security:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
      - run: go install github.com/securego/gosec/v2/cmd/gosec@v2.26.1
      - run: gosec -quiet ./...
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: govulncheck ./...

  test:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
      - run: go test -race -count=1 -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1

  build:
    runs-on: ubuntu-latest
    needs: [lint, security, test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.4"
      - name: Build static linux binary (matches the container image)
        env:
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o bin/verophi ./cmd/verophi
      - run: ./bin/verophi version
