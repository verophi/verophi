name: Trivy image

# Baut und veroeffentlicht verophi-trivy unabhaengig vom Release-Workflow. Zwei
# Ausloeser, zwei Gruende:
#   - push auf Dockerfile.trivy: Renovate bumpt den Trivy-Pin, der Merge feuert.
#   - release published: ein neues verophi-Release liefert ein neues Binary, das
#     ins Image gehoert.
# In beiden Faellen kommt das verophi-Binary aus einem Release (gh release
# download), damit das Image nie ein aelteres Binary enthaelt als das zuletzt
# veroeffentlichte. Versionierte :vX.Y.Z-Tags bleiben dem Release-Workflow
# vorbehalten; hier wandert nur :latest.
#
# Der Scan ist informativ (exit-code 0): verophi-trivy buendelt das Upstream-
# Trivy-Binary, dessen transitive CVEs ausserhalb unserer Kontrolle liegen und
# die Veroeffentlichung nicht blockieren sollen.

on:
  push:
    branches: [main]
    paths: ["Dockerfile.trivy"]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write # push to ghcr
      id-token: write # cosign keyless + attestations
      attestations: write
    env:
      IMAGE: ghcr.io/verophi/verophi-trivy
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.1.1"
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch the verophi binary from a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On a release trigger, pull that exact release (gh's "latest" never
          # matches a prerelease). Otherwise (Dockerfile.trivy bump, manual run)
          # fall back to the latest release.
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            gh release download "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" \
              --pattern verophi-linux-amd64 --output verophi
          else
            gh release download --repo "${GITHUB_REPOSITORY}" \
              --pattern verophi-linux-amd64 --output verophi
          fi
          chmod +x verophi

      - name: Push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.trivy
          push: true
          tags: ${{ env.IMAGE }}:latest
          provenance: false

      - name: Scan image (informational; verophi-trivy tracks upstream trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          cache: false

      - name: Sign image (cosign keyless, by digest)
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}"

      - name: Generate image SBOM
        run: syft "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}" -o spdx-json=sbom.spdx.json

      - name: Attest image SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Attest image provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
