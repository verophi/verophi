name: Trivy image

# Baut verophi-trivy unabhaengig vom verophi-Release: bei Trivy-Pin-Bumps
# (Renovate-Merge auf Dockerfile.trivy) und per Dispatch aus release.yml (ein
# GITHUB_TOKEN-Publish loest kein release-Event aus, workflow_dispatch schon).
# Das verophi-Binary kommt aus einem Release; nur :latest wandert, versionierte
# Tags bleiben dem Release-Workflow. Der Scan ist informativ: das gebuendelte
# Upstream-Trivy-Binary bringt CVEs mit, die wir nicht kontrollieren.

on:
  push:
    branches: [main]
    paths: ["Dockerfile.trivy"]
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Release-Tag, dessen Binary ins Image soll; leer = latest"
        type: string
        required: false
        default: ""

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write # push to ghcr
      id-token: write # cosign keyless + attestations
      attestations: write
    env:
      IMAGE: ghcr.io/verophi/verophi-trivy
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.1.2"
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4.5.1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch the verophi binaries from a release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Leerer Input faellt auf das letzte Release zurueck (gh "latest"
          # matcht nie ein Prerelease, daher uebergibt release.yml seinen Tag).
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          if [ -n "$RELEASE_TAG" ]; then
            gh release download "$RELEASE_TAG" --repo "${GITHUB_REPOSITORY}" \
              --pattern verophi-linux-amd64 --pattern verophi-linux-arm64
          else
            gh release download --repo "${GITHUB_REPOSITORY}" \
              --pattern verophi-linux-amd64 --pattern verophi-linux-arm64
          fi
          mv verophi-linux-amd64 verophi-amd64
          mv verophi-linux-arm64 verophi-arm64
          chmod +x verophi-amd64 verophi-arm64

      - name: Push multi-arch image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile.trivy
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:latest
          provenance: false

      - name: Scan image (informational; verophi-trivy tracks upstream trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          cache: false

      - name: Sign image (cosign keyless, by digest)
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}"

      - name: Generate image SBOM
        run: syft "${{ env.IMAGE }}@${{ steps.push.outputs.digest }}" -o spdx-json=sbom.spdx.json

      - name: Attest image SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Attest image provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false
