name: Release

# Triggered only by pushing a semver tag (e.g. v0.1.0). Develop via PRs to main;
# tag a tested main commit when you want to release. -rc / -beta tags produce a
# GitHub pre-release (goreleaser prerelease: auto) and are the way to test this
# pipeline end to end before a real release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Never release from untested code: re-run the full CI suite on the tagged commit.
  gate:
    uses: ./.github/workflows/ci.yml

  # Build the release binaries, create the DRAFT GitHub release, sign the
  # checksums, and attest provenance for the binaries.
  release:
    needs: gate
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create the release and upload assets
      id-token: write # cosign keyless + provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.5"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.1.1"

      - name: Run goreleaser (binaries, checksums, draft release)
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign checksums (cosign keyless)
        run: |
          cosign sign-blob --yes \
            --bundle dist/SHA256SUMS.cosign.bundle \
            dist/SHA256SUMS
          gh release upload "${GITHUB_REF_NAME}" dist/SHA256SUMS.cosign.bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest binary provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS
          create-storage-record: false

      - name: Stage linux binary for the image build
        run: |
          bin=$(find dist -type f -name verophi -path '*linux_amd64*' | head -1)
          cp "$bin" verophi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verophi-linux-amd64
          path: verophi
          retention-days: 1

  # Build the image, scan it locally, push only if clean, then sign + attest by digest.
  # verophi-trivy is built out of band by image-trivy.yml (it tracks the upstream
  # trivy release, not the verophi version).
  images:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write # push to ghcr
      id-token: write # cosign keyless + attestations
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: verophi
            image: ghcr.io/verophi/verophi
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verophi-linux-amd64
      - run: chmod +x verophi
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.1.1"
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally (no push yet)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.name }}:scan
          provenance: false

      - name: Scan image (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.name }}:scan
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          cache: false

      - name: Push image (only after a clean scan)
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ github.ref_name }}
            ${{ matrix.image }}:latest
          provenance: false

      - name: Sign image (cosign keyless, by digest)
        run: cosign sign --yes "${{ matrix.image }}@${{ steps.push.outputs.digest }}"

      - name: Generate image SBOM
        run: syft "${{ matrix.image }}@${{ steps.push.outputs.digest }}" -o spdx-json=sbom.spdx.json

      - name: Attest image SBOM
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: sbom.spdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Attest image provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  # Everything passed: publish the draft release and kick off the inttest regression.
  publish:
    needs: images
    runs-on: ubuntu-24.04
    permissions:
      contents: write # flip the draft release to published
      actions: write # dispatch image-trivy.yml
    steps:
      - name: Publish the release
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --repo "${GITHUB_REPOSITORY}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebuild verophi-trivy with this release's binary
        continue-on-error: true # the release is already published; a dispatch hiccup must not fail it
        run: |
          gh workflow run image-trivy.yml --repo "${GITHUB_REPOSITORY}" \
            -f release-tag="${GITHUB_REF_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mint verophi-ci token for the inttest dispatch
        id: dispatch_token
        continue-on-error: true # a dispatch hiccup must not fail the already-published release
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.VEROPHI_CI_APP_CLIENT_ID }}
          private-key: ${{ secrets.VEROPHI_CI_APP_PRIVATE_KEY }}
          owner: verophi
          repositories: verophi-inttest

      - name: Trigger verophi-inttest regression
        continue-on-error: true # the release is already published; a dispatch hiccup must not fail it
        env:
          GH_TOKEN: ${{ steps.dispatch_token.outputs.token }}
        run: |
          gh api repos/verophi/verophi-inttest/dispatches \
            -f event_type=verophi-image-published \
            -f "client_payload[image]=ghcr.io/verophi/verophi:${GITHUB_REF_NAME}" \
            -f "client_payload[ref]=${GITHUB_REF_NAME}"
