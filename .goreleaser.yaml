# goreleaser builds the release binaries, checksums, and the (draft) GitHub
# release. Container images, signing, SBOMs, and provenance are handled in
# .github/workflows/release.yml so images can be scanned before they are pushed.
version: 2

project_name: verophi

before:
  hooks:
    - go mod verify

builds:
  - id: verophi
    main: ./cmd/verophi
    binary: verophi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/verophi/verophi/internal/version_info.Version={{ .Tag }}
      - -X github.com/verophi/verophi/internal/version_info.Commit={{ .ShortCommit }}
      - -X github.com/verophi/verophi/internal/version_info.BuildDate={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos: [linux, darwin]
    goarch: [amd64, arm64] # linux amd64+arm64 feed the multi-arch container image

archives:
  - id: verophi
    formats: [binary] # raw binaries named verophi-<os>-<arch>, matching the README
    name_template: "verophi-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: SHA256SUMS
  algorithm: sha256

release:
  draft: true # published by the workflow after image scan, signing, and attestation
  prerelease: auto # -rc / -beta tags are marked as pre-releases
  name_template: "{{ .Tag }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
